<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Äldreboenden Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
/* ═══ RESET & BASE ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 15px; color: #333; background: #f5f6f8; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }

/* ═══ CSS VARIABLES ═══ */
:root {
  --c-utmarkt: #2e7d32; --c-utmarkt-bg: #e8f5e9; --c-utmarkt-text: #1b5e20;
  --c-bra: #1565c0; --c-bra-bg: #e3f2fd; --c-bra-text: #0d47a1;
  --c-godkand: #ef6c00; --c-godkand-bg: #fff3e0; --c-godkand-text: #e65100;
  --c-behovs: #c62828; --c-behovs-bg: #ffebee; --c-behovs-text: #b71c1c;
  --sidebar-w: 300px;
  --header-h: 52px;
  --filter-h: 68px;
}

/* ═══ HEADER ═══ */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: var(--header-h);
  background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
  color: white; display: flex; align-items: center; padding: 0 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-title { font-size: 1.05rem; font-weight: 700; margin-right: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mode-toggle { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; margin: 0 0.75rem; flex-shrink: 0; }
.mode-btn { border: none; background: none; color: rgba(255,255,255,0.7); padding: 0.3rem 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.mode-btn.active { background: rgba(255,255,255,0.25); color: white; }
.settings-btn { display: none; border: none; background: rgba(255,255,255,0.15); color: white; width: 36px; height: 36px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
.settings-btn:active { background: rgba(255,255,255,0.3); }

/* ═══ FILTER BAR ═══ */
.filter-bar {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 290;
  background: white; padding: 0.35rem 0.75rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto;
}
.filter-row { display: flex; align-items: center; gap: 0.35rem; flex-wrap: nowrap; }
.filter-row + .filter-row { margin-top: 0.25rem; }
.tier-pill { border: none; padding: 0.2rem 0.65rem; border-radius: 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: white; opacity: 0.5; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; flex-shrink: 0; }
.tier-pill.active { opacity: 1; }
.tier-pill:active { transform: scale(0.95); }
.kommun-pill { border: 1px solid #bbb; background: white; color: #555; padding: 0.15rem 0.55rem; border-radius: 12px; font-size: 0.72rem; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.kommun-pill.active { background: #1a237e; color: white; border-color: #1a237e; }
.kommun-pill:active { transform: scale(0.95); }
.search-box { margin-left: auto; border: 1px solid #ddd; border-radius: 8px; padding: 0.25rem 0.6rem; font-size: 0.8rem; width: 160px; outline: none; flex-shrink: 0; }
.search-box:focus { border-color: #1565c0; box-shadow: 0 0 0 2px rgba(21,101,192,0.15); }
.home-count { font-size: 0.75rem; color: #999; margin-left: 0.5rem; white-space: nowrap; flex-shrink: 0; }

/* ═══ LAYOUT ═══ */
.main-wrap {
  display: flex;
  margin-top: calc(var(--header-h) + var(--filter-h));
  min-height: calc(100vh - var(--header-h) - var(--filter-h));
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  position: fixed; top: calc(var(--header-h) + var(--filter-h));
  left: 0; bottom: 0; width: var(--sidebar-w);
  background: white; border-right: 1px solid #e5e7eb;
  overflow-y: auto; padding: 1rem; z-index: 100;
  -webkit-overflow-scrolling: touch;
}
.sidebar h3 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 0.6rem; margin-top: 1.2rem; }
.sidebar h3:first-child { margin-top: 0; }

.weight-domain-header { font-size: 0.72rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 0.7rem; margin-bottom: 0.2rem; padding-bottom: 0.15rem; border-bottom: 1px solid #eee; }
.weight-domain-header:first-child { margin-top: 0; }
.weight-group { margin-bottom: 0.3rem; }
.weight-label { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 0.1rem; }
.weight-label span:last-child { font-weight: 600; color: #1a237e; min-width: 3em; text-align: right; }
.weight-slider { width: 100%; height: 5px; -webkit-appearance: none; appearance: none; background: #e0e0e0; border-radius: 3px; outline: none; }
.weight-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #1a237e; cursor: pointer; }

.presets { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.6rem; margin-bottom: 0.5rem; }
.preset-btn { border: 1px solid #ccc; background: white; padding: 0.2rem 0.55rem; border-radius: 12px; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; }
.preset-btn.active { background: #1a237e; color: white; border-color: #1a237e; }
.preset-btn:hover:not(.active) { border-color: #1a237e; color: #1a237e; }

.ewma-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #888; margin-top: 0.2rem; }
.ewma-val { text-align: center; font-size: 0.85rem; font-weight: 700; color: #1a237e; margin: 0.3rem 0; }
.year-weights { margin-top: 0.4rem; }
.year-weight-row { display: flex; align-items: center; font-size: 0.72rem; margin-bottom: 0.15rem; }
.year-weight-row .yw-year { width: 32px; color: #888; }
.year-weight-row .yw-bar { flex: 1; height: 8px; background: #e8eaf6; border-radius: 4px; overflow: hidden; margin: 0 0.4rem; }
.year-weight-row .yw-fill { height: 100%; background: #3949ab; border-radius: 4px; transition: width 0.3s; }
.year-weight-row .yw-pct { width: 28px; text-align: right; color: #666; font-weight: 500; }

.start-year-val { text-align: center; font-size: 0.85rem; font-weight: 700; color: #1a237e; margin: 0.3rem 0; }
.summary-text { font-size: 0.75rem; color: #888; font-style: italic; margin-top: 0.5rem; line-height: 1.4; }

/* ═══ TABLE CONTAINER ═══ */
.table-container {
  flex: 1; margin-left: var(--sidebar-w); padding: 0.75rem;
  overflow-x: auto;
}
.ranking-table { width: 100%; border-collapse: collapse; }
.ranking-table th {
  position: sticky; top: 0; background: #f8f9fa;
  padding: 0.5rem 0.4rem; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
  color: #666; border-bottom: 2px solid #e0e0e0; cursor: pointer; user-select: none;
  white-space: nowrap; text-align: left;
}
.ranking-table th:hover { color: #1a237e; }
.ranking-table th.sort-active { color: #1a237e; }
.ranking-table th .sort-arrow { font-size: 0.65rem; margin-left: 0.15rem; }

.ranking-row {
  cursor: pointer; transition: background 0.15s;
}
.ranking-row:hover { background: #f5f7ff; }
.ranking-row td { padding: 0.45rem 0.4rem; font-size: 0.85rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.ranking-row.expanded { background: #f5f7ff; }

.col-rank { width: 36px; text-align: center; font-weight: 700; color: #999; font-size: 0.8rem; }
.col-name { font-weight: 600; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.home-link { color: #999; text-decoration: none; font-size: 0.75rem; margin-left: 0.2rem; }
.home-link:hover { color: #1565c0; }
.col-kommun, .col-stadsdel { font-size: 0.8rem; color: #666; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-drift { font-size: 0.75rem; }
.col-score { font-weight: 700; font-size: 0.95rem; text-align: right; }
.col-lcb { font-size: 0.8rem; color: #888; text-align: right; }
.col-trend { text-align: center; font-size: 1rem; }
.col-tier { white-space: nowrap; }
.col-platser { font-size: 0.8rem; color: #666; text-align: right; }
.col-conf { font-size: 0.75rem; color: #888; }
.col-spark { width: 80px; padding: 0.2rem !important; }
.col-spark canvas { display: block; }

.tier-badge { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 10px; font-size: 0.7rem; font-weight: 600; color: white; }

/* ═══ DETAIL PANEL ═══ */
.detail-row td { padding: 0 !important; border-bottom: 2px solid #e0e0e0; }
.detail-panel {
  padding: 1rem 1.25rem; background: #fafbff;
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
}
.detail-chart { background: white; border-radius: 8px; padding: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.detail-chart h4 { font-size: 0.78rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.03em; }
.detail-chart canvas { width: 100% !important; height: 200px !important; }
.detail-meta { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 0.5rem; }
.meta-chip { background: #f0f2f5; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.78rem; color: #555; }
.meta-chip b { color: #333; }

/* Domain bars in detail */
.domain-bars { margin-top: 0.5rem; }
.domain-bar-row { display: flex; align-items: center; margin-bottom: 0.35rem; font-size: 0.78rem; }
.domain-bar-label { width: 130px; color: #555; flex-shrink: 0; }
.domain-bar-track { flex: 1; height: 14px; background: #f0f0f0; border-radius: 7px; margin: 0 0.5rem; position: relative; overflow: visible; }
.domain-bar-fill { height: 100%; border-radius: 7px; transition: width 0.4s; position: relative; z-index: 1; }
.domain-bar-whisker { position: absolute; top: 50%; height: 1px; background: #999; z-index: 0; }
.domain-bar-box { position: absolute; top: 2px; bottom: 2px; border: 1.5px solid rgba(0,0,0,0.25); border-radius: 2px; z-index: 2; pointer-events: none; }
.domain-bar-median-line { position: absolute; top: 1px; bottom: 1px; width: 2px; background: rgba(0,0,0,0.45); z-index: 3; transform: translateX(-1px); pointer-events: none; }
.domain-bar-val { width: 36px; text-align: right; font-weight: 600; }

/* ═══ BOTTOM SHEET (iPad) ═══ */
.bottom-sheet-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 400; opacity: 0; transition: opacity 0.3s;
}
.bottom-sheet-overlay.visible { opacity: 1; }
.bottom-sheet {
  display: none; position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 410; background: white; border-radius: 16px 16px 0 0;
  max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0.5rem 1rem 2rem;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
}
.bottom-sheet.visible { transform: translateY(0); }
.bs-handle { width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin: 0.5rem auto 1rem; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1023px) {
  .sidebar { display: none; }
  .settings-btn { display: block; }
  .table-container { margin-left: 0; }
  .col-kommun, .col-stadsdel { display: none; }
  .detail-panel { grid-template-columns: 1fr; }
  .col-name { max-width: 180px; }
  .bottom-sheet-overlay, .bottom-sheet { display: block; }
}
@media (min-width: 1024px) {
  .bottom-sheet-overlay, .bottom-sheet { display: none !important; }
}

/* ═══ ANIMATIONS ═══ */
.ranking-row { transition: transform 0.4s ease, background 0.15s; }
.ranking-row.flip-active { will-change: transform; }

/* ═══ SCROLLBAR ═══ */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <span class="header-title">Äldreboenden Explorer</span>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="linear" onclick="setMode('linear')">Top-svar</button>
    <button class="mode-btn" data-mode="positiv" onclick="setMode('positiv')">Alla positiva</button>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">&#9881;</button>
</header>

<!-- ═══ FILTER BAR ═══ -->
<div class="filter-bar">
  <div class="filter-row">
    <button class="tier-pill active" style="background:#555" data-tier="all" onclick="setTierFilter('all')">Alla</button>
    <button class="tier-pill" style="background:var(--c-utmarkt)" data-tier="Utmärkt" onclick="setTierFilter('Utmärkt')">Utmärkt</button>
    <button class="tier-pill" style="background:var(--c-bra)" data-tier="Bra" onclick="setTierFilter('Bra')">Bra</button>
    <button class="tier-pill" style="background:var(--c-godkand)" data-tier="Godkänd" onclick="setTierFilter('Godkänd')">Godkänd</button>
    <button class="tier-pill" style="background:var(--c-behovs)" data-tier="Behöver utvecklas" onclick="setTierFilter('Behöver utvecklas')">Behöver utv.</button>
    <input type="search" class="search-box" id="searchInput" placeholder="Sök boende..." oninput="onSearch()">
    <span class="home-count" id="homeCount"></span>
  </div>
  <div class="filter-row" id="kommunRow"></div>
</div>

<!-- ═══ MAIN LAYOUT ═══ -->
<div class="main-wrap">

  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar" id="sidebarDesktop">
    <h3>Frågevikter</h3>
    <div id="weightSliders"></div>
    <div class="presets" id="presetBtns"></div>

    <h3>Aktualitet (EWMA &lambda;)</h3>
    <div class="ewma-label"><span>Senaste råder</span><span>Alla år lika</span></div>
    <input type="range" class="weight-slider" id="ewmaSlider" min="30" max="100" value="60" step="5" oninput="onEwmaChange(this.value)">
    <div class="ewma-val" id="ewmaVal">&lambda; = 0.70</div>
    <div class="year-weights" id="yearWeights"></div>

    <h3>Från år</h3>
    <input type="range" class="weight-slider" id="startYearSlider" min="0" max="6" value="0" step="1" oninput="onStartYearChange(this.value)">
    <div class="start-year-val" id="startYearVal">2018</div>
    <div class="summary-text" id="summaryText"></div>

    <h3>Antal platser</h3>
    <div class="ewma-label"><span>Min</span><span id="platserMinVal">0</span></div>
    <input type="range" class="weight-slider" id="platserMinSlider" min="0" max="130" value="0" step="5" oninput="onPlatserChange()">
    <div class="ewma-label" style="margin-top:0.4rem"><span>Max</span><span id="platserMaxVal">130</span></div>
    <input type="range" class="weight-slider" id="platserMaxSlider" min="0" max="130" value="130" step="5" oninput="onPlatserChange()">
    <div class="summary-text" id="platserSummary"></div>
  </aside>

  <!-- TABLE -->
  <div class="table-container">
    <table class="ranking-table">
      <thead>
        <tr>
          <th class="col-rank" onclick="sortBy('rank')"># <span class="sort-arrow"></span></th>
          <th onclick="sortBy('name')">Namn <span class="sort-arrow"></span></th>
          <th class="col-kommun" onclick="sortBy('kommun')">Kommun <span class="sort-arrow"></span></th>
          <th class="col-stadsdel" onclick="sortBy('stadsdel')">Stadsdel <span class="sort-arrow"></span></th>
          <th class="col-drift" onclick="sortBy('driftform')">Drift <span class="sort-arrow"></span></th>
          <th class="col-platser" onclick="sortBy('platser')">Platser <span class="sort-arrow"></span></th>
          <th class="col-score" onclick="sortBy('score')">Score <span class="sort-arrow"></span></th>
          <th class="col-lcb" onclick="sortBy('lcb')">LCB <span class="sort-arrow"></span></th>
          <th class="col-spark">Trend</th>
          <th class="col-trend" onclick="sortBy('trend')">&#8226;</th>
          <th class="col-tier" onclick="sortBy('tier')">Tier <span class="sort-arrow"></span></th>
          <th class="col-conf" onclick="sortBy('conf')">Konf. <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- ═══ BOTTOM SHEET (iPad) ═══ -->
<div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeBottomSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="bs-handle"></div>
  <div id="bsContent"></div>
</div>

const TIER_COLORS_RAW = {"Utmärkt":"#2e7d32","Bra":"#1565c0","Godkänd":"#ef6c00","Behöver utvecklas":"#c62828"};
const TIER_BG = {"Utmärkt":"var(--c-utmarkt-bg)","Bra":"var(--c-bra-bg)","Godkänd":"var(--c-godkand-bg)","Behöver utvecklas":"var(--c-behovs-bg)"};

// ═══════════════════════════════════════════════════════════════════
// PRESETS (per-question weights, sum to 100)
// ═══════════════════════════════════════════════════════════════════
// Scored questions = QUESTIONS minus hälsa domain (hälsa has 0% default weight)
const HALSA_QS = DOMAINS[HALSA_DOMAIN];
const SCORED_QS = QUESTIONS.filter(q => !HALSA_QS.includes(q));
const EQ = 100 / SCORED_QS.length;
function makePreset(domainWeights) {
  const w = {};
  for (const [d, qs] of Object.entries(DOMAINS)) {
    const dw = domainWeights[d] || 0;
    const perQ = dw / qs.length;
    for (const q of qs) w[q] = perQ;
  }
  return w;
}
const PRESETS = {
  "Rekommenderad": (() => { const w = {}; const rest = 65 / (SCORED_QS.length - 1); for (const q of QUESTIONS) { if (HALSA_QS.includes(q)) w[q] = 0; else w[q] = q === "nöjd_sammantaget" ? 35 : rest; } return w; })(),
  "Jämn": (() => { const w = {}; for (const q of QUESTIONS) w[q] = HALSA_QS.includes(q) ? 0 : EQ; return w; })(),
  "Domänbalans": makePreset({personal:100/7,mat:100/7,"miljö":100/7,aktiviteter:100/7,"nöjdhet":100/7,inflytande:100/7,"vård":100/7,"hälsa":0}),
  "Fokus personal": makePreset({personal:45,mat:8,"miljö":10,aktiviteter:8,"nöjdhet":12,inflytande:9,"vård":8,"hälsa":0}),
  "Fokus mat": makePreset({personal:10,mat:45,"miljö":10,aktiviteter:8,"nöjdhet":12,inflytande:8,"vård":7,"hälsa":0}),
  "Fokus miljö": makePreset({personal:10,mat:8,"miljö":45,aktiviteter:10,"nöjdhet":12,inflytande:8,"vård":7,"hälsa":0}),
  "Fokus inflytande": makePreset({personal:10,mat:7,"miljö":8,aktiviteter:7,"nöjdhet":12,inflytande:45,"vård":11,"hälsa":0}),
  "Fokus vård": makePreset({personal:10,mat:7,"miljö":8,aktiviteter:7,"nöjdhet":12,inflytande:11,"vård":45,"hälsa":0}),
};

// ═══════════════════════════════════════════════════════════════════
// STATE (weights are per-question floats summing to 100)
// ═══════════════════════════════════════════════════════════════════
const state = {
  mode: "linear",
  weights: Object.assign({}, PRESETS["Rekommenderad"]),
  lambda: 0.60,
  startYear: ALL_YEARS[0],
  tierFilter: "all",
  kommunFilter: "all",
  platserMin: 0,
  platserMax: 130,
  searchQuery: "",
  sortCol: "rank",
  sortAsc: true,
  expandedId: null,
  activePreset: "Rekommenderad",
};

let currentResults = [];
let currentQStats = {}; // per-question {min, p25, p50, p75, max}
let recalcTimer = null;
let dragOrigin = null; // {q, weights} for even slider redistribution

const Q_COLORS = ["#e53935","#ffa726","#9ccc65","#2e7d32"];
function qColor(val, q) {
  const s = currentQStats[q];
  if (!s || val == null) return "#9e9e9e";
  if (val >= s.p75) return Q_COLORS[3];
  if (val >= s.p50) return Q_COLORS[2];
  if (val >= s.p25) return Q_COLORS[1];
  return Q_COLORS[0];
}

// ═══════════════════════════════════════════════════════════════════
// RANKING ENGINE (port of rank_boenden.py)
// ═══════════════════════════════════════════════════════════════════

function computeQuestionScore(qd, q, mode) {
  if (!qd || qd[1] == null) return null;
  const positiv = qd[1], neutral = qd[2], negativ = qd[3], est1 = qd[0];
  if (mode === "positiv") return positiv;
  const scale = SCALE_TYPES[q];
  if (scale === 3) {
    const pPos = positiv / 100;
    const pNeu = neutral != null ? neutral / 100 : 0;
    return 100 * pPos + 50 * pNeu;
  }
  if (est1 == null) return null;
  const p1 = est1 / 100;
  const p2 = Math.max((positiv - est1) / 100, 0);
  const pNeu = neutral != null ? neutral / 100 : 0;
  if (scale === 5) return 100 * p1 + 75 * p2 + 50 * pNeu;
  if (scale === 4) return 100 * p1 + 67 * p2 + 33 * pNeu;
  return null;
}

function recalculate() {
  const mode = state.mode;
  // Normalize question weights to fractions summing to 1
  const wTotal = QUESTIONS.reduce((a, q) => a + state.weights[q], 0);
  const wFrac = {};
  for (const q of QUESTIONS) wFrac[q] = state.weights[q] / wTotal;
  const lambda = state.lambda;
  const startYear = state.startYear;

  // 1. Question scores
  const qScores = {};
  for (const home of HOMES) {
    qScores[home.id] = {};
    for (const [ys, yd] of Object.entries(home.data)) {
      const year = parseInt(ys);
      if (year < startYear) continue;
      qScores[home.id][year] = {};
      for (const q of QUESTIONS) {
        qScores[home.id][year][q] = computeQuestionScore(yd.q[q], q, mode);
      }
    }
  }

  // 2. Z-scores within year
  const zScores = {};
  const refStats = {};
  const activeYears = ALL_YEARS.filter(y => y >= startYear);

  for (const q of QUESTIONS) {
    for (const year of activeYears) {
      const vals = [];
      for (const home of HOMES) {
        const s = qScores[home.id]?.[year]?.[q];
        if (s != null) vals.push({id: home.id, score: s});
      }
      if (vals.length === 0) continue;
      const mean = vals.reduce((a, v) => a + v.score, 0) / vals.length;
      const n = vals.length;
      const sumSqDev = vals.reduce((a, v) => a + (v.score - mean) ** 2, 0);
      const std = n > 1 ? Math.sqrt(sumSqDev / (n - 1)) : 0;
      for (const v of vals) {
        if (!zScores[v.id]) zScores[v.id] = {};
        if (!zScores[v.id][year]) zScores[v.id][year] = {};
        zScores[v.id][year][q] = std > 0 ? (v.score - mean) / std : 0;
      }
      if (year === LATEST_YEAR) refStats[q] = {mean, std: std > 0 ? std : 1};
    }
    if (!refStats[q]) {
      const all = [];
      for (const home of HOMES) {
        for (const y of activeYears) {
          const s = qScores[home.id]?.[y]?.[q];
          if (s != null) all.push(s);
        }
      }
      if (all.length > 0) {
        const m = all.reduce((a, b) => a + b, 0) / all.length;
        const s = all.length > 1 ? Math.sqrt(all.reduce((a, v) => a + (v - m) ** 2, 0) / (all.length - 1)) : 1;
        refStats[q] = {mean: m, std: Math.max(s, 1)};
      } else {
        refStats[q] = {mean: 50, std: 10};
      }
    }
  }

  // 3. Domain Z (for display only) + Composite Z (question-weighted)
  for (const home of HOMES) {
    for (const year of activeYears) {
      if (!zScores[home.id]?.[year]) continue;
      // Domain Z for detail panel display
      const domZ = {};
      for (const [domain, qs] of Object.entries(DOMAINS)) {
        const qzs = qs.map(q => zScores[home.id][year]?.[q]).filter(v => v != null);
        domZ[domain] = qzs.length > 0 ? qzs.reduce((a, b) => a + b, 0) / qzs.length : null;
      }
      zScores[home.id][year]._dom = domZ;
      // Composite = weighted mean of individual question Z-scores
      let ws = 0, vs = 0;
      for (const q of QUESTIONS) {
        const qz = zScores[home.id][year]?.[q];
        if (qz != null) { vs += qz * wFrac[q]; ws += wFrac[q]; }
      }
      zScores[home.id][year]._comp = ws > 0 ? vs / ws : null;
    }
  }

  // 5. EWMA + SE + LCB
  const results = [];
  for (const home of HOMES) {
    const validYears = activeYears.filter(y => zScores[home.id]?.[y]?._comp != null);
    if (validYears.length === 0) continue;
    const weights = validYears.map(y => Math.pow(lambda, LATEST_YEAR - y));
    const comps = validYears.map(y => zScores[home.id][y]._comp);
    const wS = weights.reduce((a, b) => a + b, 0);
    const ewma = weights.reduce((a, w, i) => a + w * comps[i], 0) / wS;

    let seT = NaN;
    if (comps.length > 1) {
      const varObs = weights.reduce((a, w, i) => a + w * (comps[i] - ewma) ** 2, 0) / wS;
      seT = Math.sqrt(weights.reduce((a, w) => a + w * w * varObs, 0) / (wS * wS));
    }
    const evPerYear = validYears.map(year => {
      const yd = home.data[String(year)];
      if (!yd) return 0;
      const qVars = QUESTIONS.map(q => {
        const sc = SCALE_TYPES[q]; if (sc === 3) return 0;
        if (yd.svar !== "<30") return 0;
        const mae = EST_MAE[q] || 6.0; const sigE = mae * 1.25;
        const sens = sc === 5 ? 0.25 : sc === 4 ? 0.33 : 0;
        return (sens * sigE) ** 2;
      });
      return qVars.reduce((a, b) => a + b, 0) / qVars.length;
    });
    const evW = weights.reduce((a, w, i) => a + w * w * evPerYear[i], 0) / (wS * wS);
    let totalSE;
    if (!isNaN(seT)) totalSE = Math.sqrt(seT ** 2 + evW);
    else if (validYears.length === 1) totalSE = Math.sqrt(0.09 + evW);
    else totalSE = evW > 0 ? Math.sqrt(evW) : 0.3;

    const nEff = (wS ** 2) / weights.reduce((a, w) => a + w ** 2, 0);
    const lcb = ewma - 1.0 * totalSE;
    const latestYr = Math.max(...validYears);
    const latestZ = zScores[home.id][latestYr]._comp;
    let trend = "\u2014";
    if (validYears.length >= 2 && latestZ != null) {
      const diff = latestZ - ewma;
      trend = diff > 0.2 ? "\u2191" : diff < -0.2 ? "\u2193" : "\u2192";
    }
    const domEwma = {};
    for (const d of [...DOMAIN_ORDER, HALSA_DOMAIN]) {
      const dVals = validYears.map(y => zScores[home.id][y]._dom?.[d]);
      let dWS = 0, dVS = 0;
      for (let i = 0; i < validYears.length; i++) {
        if (dVals[i] != null) { dVS += weights[i] * dVals[i]; dWS += weights[i]; }
      }
      domEwma[d] = dWS > 0 ? dVS / dWS : 0;
    }
    const qEwma = {};
    for (const q of QUESTIONS) {
      const qVals = validYears.map(y => zScores[home.id][y]?.[q]);
      let qWS = 0, qVS = 0;
      for (let i = 0; i < validYears.length; i++) {
        if (qVals[i] != null) { qVS += weights[i] * qVals[i]; qWS += weights[i]; }
      }
      qEwma[q] = qWS > 0 ? qVS / qWS : null;
    }
    const yearly = {};
    for (const y of validYears) yearly[y] = zScores[home.id][y]._comp;
    const latestSvar = home.data[String(latestYr)]?.svar || "";
    let conf;
    if (nEff >= 3.0 && latestSvar === "\u226530") conf = "Hög";
    else if (nEff >= 2.0 || latestSvar === "\u226530") conf = "Medium";
    else conf = "Låg";
    results.push({home, ewma, se: totalSE, lcb, nEff, trend, domEwma, qEwma, yearly, nYears: validYears.length, latestYr, latestSvar, conf});
  }

  results.sort((a, b) => b.lcb - a.lcb);
  const lcbs = results.map(r => r.lcb);
  const p80 = percentile(lcbs, 0.80);
  const p45 = percentile(lcbs, 0.45);
  const p15 = percentile(lcbs, 0.15);
  results.forEach((r, i) => {
    r.rank = i + 1;
    r.tier = r.lcb >= p80 ? "Utmärkt" : r.lcb >= p45 ? "Bra" : r.lcb >= p15 ? "Godkänd" : "Behöver utvecklas";
  });

  const avgMean = QUESTIONS.reduce((a, q) => a + refStats[q].mean, 0) / QUESTIONS.length;
  const avgStd = QUESTIONS.reduce((a, q) => a + refStats[q].std, 0) / QUESTIONS.length;
  for (const r of results) {
    r.displayScore = r.ewma * avgStd + avgMean;
    r.displayLcb = r.lcb * avgStd + avgMean;
    r.domainDisplay = {};
    for (const d of [...DOMAIN_ORDER, HALSA_DOMAIN]) {
      const qs = DOMAINS[d];
      const dM = qs.reduce((a, q) => a + (refStats[q]?.mean || 50), 0) / qs.length;
      const dS = qs.reduce((a, q) => a + (refStats[q]?.std || 10), 0) / qs.length;
      r.domainDisplay[d] = r.domEwma[d] * dS + dM;
    }
    r.questionDisplay = {};
    for (const q of QUESTIONS) {
      if (r.qEwma[q] != null) {
        r.questionDisplay[q] = r.qEwma[q] * refStats[q].std + refStats[q].mean;
      }
    }
    r.yearlyDisplay = {};
    for (const [y, z] of Object.entries(r.yearly)) {
      r.yearlyDisplay[y] = z * avgStd + avgMean;
    }
  }
  // Compute per-question distribution stats for box-and-whisker
  const qs = {};
  for (const q of QUESTIONS) {
    const vals = results.map(r => r.questionDisplay[q]).filter(v => v != null).sort((a,b) => a-b);
    if (vals.length > 0) {
      qs[q] = { min: vals[0], p25: percentile(vals, 0.25), p50: percentile(vals, 0.50), p75: percentile(vals, 0.75), max: vals[vals.length-1] };
    }
  }
  currentQStats = qs;
  return results;
}

function percentile(arr, p) {
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = p * (sorted.length - 1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if (lo === hi) return sorted[lo];
  return sorted[lo] * (hi - idx) + sorted[hi] * (idx - lo);
}

function renderTable(results, animate) {
  const tbody = document.getElementById("tableBody");
  const filter = state.tierFilter;
  const query = state.searchQuery.toLowerCase();
  let filtered = results;
  if (filter !== "all") filtered = filtered.filter(r => r.tier === filter);
  if (state.kommunFilter !== "all") filtered = filtered.filter(r => r.home.kommun === state.kommunFilter);
  if (state.platserMin > 0 || state.platserMax < 130) {
    filtered = filtered.filter(r => r.home.platser != null && r.home.platser >= state.platserMin && r.home.platser <= state.platserMax);
  }
  if (query) filtered = filtered.filter(r =>
    r.home.name.toLowerCase().includes(query) ||
    r.home.kommun.toLowerCase().includes(query) ||
    r.home.stadsdel.toLowerCase().includes(query)
  );
  // Re-rank and re-tier within filtered set
  filtered = filtered.map(r => Object.assign({}, r));
  filtered.sort((a, b) => b.lcb - a.lcb);
  if (filtered.length > 0) {
    const lcbs = filtered.map(r => r.lcb);
    const p80 = percentile(lcbs, 0.80);
    const p45 = percentile(lcbs, 0.45);
    const p15 = percentile(lcbs, 0.15);
    filtered.forEach((r, i) => {
      r.rank = i + 1;
      r.tier = r.lcb >= p80 ? "Utmärkt" : r.lcb >= p45 ? "Bra" : r.lcb >= p15 ? "Godkänd" : "Behöver utvecklas";
    });
  }
  filtered = applySorting(filtered);
  document.getElementById("homeCount").textContent = filtered.length + " / " + results.length;

  const oldPos = new Map();
  if (animate) {
    for (const row of tbody.querySelectorAll(".ranking-row"))
      oldPos.set(row.dataset.id, row.getBoundingClientRect());
  }

  let html = "";
  for (const r of filtered) {
    const tierColor = TIER_COLORS[r.tier];
    const expanded = state.expandedId === r.home.id;
    html += '<tr class="ranking-row' + (expanded ? " expanded" : "") + '" data-id="' + escHtml(r.home.id) + '" onclick="toggleDetail(\'' + escJs(r.home.id) + '\')">';
    html += '<td class="col-rank">' + r.rank + "</td>";
    html += '<td class="col-name">' + escHtml(r.home.name) + (r.home.url ? ' <a href="' + escHtml(r.home.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="home-link">&#8599;</a>' : '') + "</td>";
    html += '<td class="col-kommun">' + escHtml(r.home.kommun) + "</td>";
    html += '<td class="col-stadsdel">' + escHtml(r.home.stadsdel) + "</td>";
    html += '<td class="col-drift">' + escHtml(r.home.driftform) + "</td>";
    html += '<td class="col-platser">' + (r.home.platser || "–") + "</td>";
    html += '<td class="col-score" style="color:' + tierColor + '">' + r.displayScore.toFixed(1) + "</td>";
    html += '<td class="col-lcb">' + r.displayLcb.toFixed(1) + "</td>";
    html += '<td class="col-spark"><canvas width="80" height="24" data-home="' + escHtml(r.home.id) + '"></canvas></td>';
    html += '<td class="col-trend">' + trendHtml(r.trend) + "</td>";
    html += '<td class="col-tier"><span class="tier-badge" style="background:' + tierColor + '">' + escHtml(tierShort(r.tier)) + "</span></td>";
    html += '<td class="col-conf">' + escHtml(r.conf) + "</td>";
    html += "</tr>";
    if (expanded) html += '<tr class="detail-row"><td colspan="12">' + renderDetailPanel(r) + "</td></tr>";
  }
  tbody.innerHTML = html;
  drawAllSparklines(filtered);
  if (state.expandedId) {
    const r = filtered.find(r => r.home.id === state.expandedId);
    if (r) renderDetailCharts(r);
  }
  if (animate && oldPos.size > 0) {
    for (const row of tbody.querySelectorAll(".ranking-row")) {
      const old = oldPos.get(row.dataset.id);
      if (!old) continue;
      const dy = old.top - row.getBoundingClientRect().top;
      if (Math.abs(dy) < 1) continue;
      row.classList.add("flip-active");
      row.style.transform = "translateY(" + dy + "px)";
      row.style.transition = "none";
      requestAnimationFrame(() => {
        row.style.transition = "transform 0.4s ease";
        row.style.transform = "";
        row.addEventListener("transitionend", () => row.classList.remove("flip-active"), {once: true});
      });
    }
  }
}

function applySorting(results) {
  const col = state.sortCol, asc = state.sortAsc;
  const sorted = [...results];
  sorted.sort((a, b) => {
    let va, vb;
    switch (col) {
      case "rank": va = a.rank; vb = b.rank; break;
      case "name": va = a.home.name; vb = b.home.name; break;
      case "kommun": va = a.home.kommun; vb = b.home.kommun; break;
      case "stadsdel": va = a.home.stadsdel; vb = b.home.stadsdel; break;
      case "driftform": va = a.home.driftform; vb = b.home.driftform; break;
      case "platser": va = a.home.platser || 0; vb = b.home.platser || 0; break;
      case "score": va = a.displayScore; vb = b.displayScore; break;
      case "lcb": va = a.displayLcb; vb = b.displayLcb; break;
      case "tier": va = tierOrder(a.tier); vb = tierOrder(b.tier); break;
      case "trend": va = trendOrder(a.trend); vb = trendOrder(b.trend); break;
      case "conf": va = confOrder(a.conf); vb = confOrder(b.conf); break;
      default: va = a.rank; vb = b.rank;
    }
    if (typeof va === "string") return asc ? va.localeCompare(vb, "sv") : vb.localeCompare(va, "sv");
    return asc ? va - vb : vb - va;
  });
  return sorted;
}

function tierOrder(t) { return {"Utmärkt":0,"Bra":1,"Godkänd":2,"Behöver utvecklas":3}[t] ?? 4; }
function trendOrder(t) { return {"\u2191":0,"\u2192":1,"\u2014":2,"\u2193":3}[t] ?? 2; }
function confOrder(c) { return {"Hög":0,"Medium":1,"Låg":2}[c] ?? 3; }
function tierShort(t) { return t === "Behöver utvecklas" ? "Behöver utv." : t; }
function trendHtml(t) {
  if (t === "\u2191") return '<span style="color:var(--c-utmarkt)">\u2191</span>';
  if (t === "\u2193") return '<span style="color:var(--c-behovs)">\u2193</span>';
  if (t === "\u2192") return '<span style="color:#757575">\u2192</span>';
  return '<span style="color:#bbb">\u2014</span>';
}
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escJs(s) { return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function drawAllSparklines(filtered) {
  const canvases = document.querySelectorAll(".col-spark canvas");
  const resultsMap = new Map(filtered.map(r => [r.home.id, r]));
  for (const c of canvases) {
    const r = resultsMap.get(c.dataset.home);
    if (r) drawSparkline(c, r.yearlyDisplay, TIER_COLORS_RAW[r.tier] || "#999");
  }
}
function drawSparkline(canvas, yearlyDisplay, color) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + "px"; canvas.style.height = h + "px";
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);
  const years = Object.keys(yearlyDisplay).map(Number).sort((a, b) => a - b);
  if (years.length < 2) {
    if (years.length === 1) { ctx.beginPath(); ctx.arc(w/2,h/2,3,0,Math.PI*2); ctx.fillStyle=color; ctx.fill(); }
    return;
  }
  const values = years.map(y => yearlyDisplay[y]);
  const vMin = Math.min(...values)-2, vMax = Math.max(...values)+2, range = vMax-vMin||1;
  const pad=4, dw=w-2*pad, dh=h-2*pad;
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin="round";
  years.forEach((y,i) => {
    const x = pad+(i/(years.length-1))*dw, yp = pad+(1-(values[i]-vMin)/range)*dh;
    if (i===0) ctx.moveTo(x,yp); else ctx.lineTo(x,yp);
  });
  ctx.stroke();
  const lx=pad+dw, ly=pad+(1-(values[values.length-1]-vMin)/range)*dh;
  ctx.beginPath(); ctx.arc(lx,ly,2.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
}

function renderDetailPanel(r) {

  html += '<div class="detail-chart"><h4>Domänprofil</h4><canvas id="chartRadar"></canvas></div>';
  html += '<div class="detail-chart"><h4>Frågepoäng</h4><div class="domain-bars">';
  for (const d of [...DOMAIN_ORDER, HALSA_DOMAIN]) {
    const domQs = DOMAINS[d];
    const anyVal = domQs.some(q => r.questionDisplay[q] != null);
    if (!anyVal) continue;
    html += '<div style="font-size:0.7rem;font-weight:700;color:'+(d===HALSA_DOMAIN?'#9e9e9e':'#999')+';text-transform:uppercase;letter-spacing:0.03em;margin-top:0.5rem;margin-bottom:0.2rem">' + DOMAIN_NAMES[d] + '</div>';
    for (const q of domQs) {
      const val = r.questionDisplay[q];
      if (val == null) continue;
      const pct = Math.max(0,Math.min(100,val)), color = qColor(val, q);
      const s = currentQStats[q];
      html += '<div class="domain-bar-row"><span class="domain-bar-label">'+Q_NAMES[q]+'</span>';
      html += '<div class="domain-bar-track">';
      if (s) {
        const cl = v => Math.max(0,Math.min(100,v));
        const mn = cl(s.min), mx = cl(s.max), b25 = cl(s.p25), b75 = cl(s.p75), med = cl(s.p50);
        html += '<div class="domain-bar-whisker" style="left:'+mn.toFixed(1)+'%;width:'+(mx-mn).toFixed(1)+'%"></div>';
        html += '<div class="domain-bar-box" style="left:'+b25.toFixed(1)+'%;width:'+(b75-b25).toFixed(1)+'%"></div>';
        html += '<div class="domain-bar-median-line" style="left:'+med.toFixed(1)+'%" title="Median: '+s.p50.toFixed(1)+'%"></div>';
      }
      html += '<div class="domain-bar-fill" style="width:'+pct.toFixed(0)+'%;background:'+color+'"></div>';
      html += '</div>';
      html += '<span class="domain-bar-val" style="color:'+color+'">'+val.toFixed(1)+'</span></div>';
    }
  }
  html += "</div></div>";
  html += '<div class="detail-chart"><h4>Information</h4><div class="detail-meta">';
  html += '<span class="meta-chip"><b>Kommun:</b> '+escHtml(r.home.kommun)+"</span>";
  if (r.home.stadsdel) html += '<span class="meta-chip"><b>Stadsdel:</b> '+escHtml(r.home.stadsdel)+"</span>";
  html += '<span class="meta-chip"><b>Drift:</b> '+escHtml(r.home.driftform)+"</span>";
  if (r.home.platser) html += '<span class="meta-chip"><b>Platser:</b> '+r.home.platser+"</span>";
  html += '<span class="meta-chip"><b>Konfidens:</b> '+escHtml(r.conf)+"</span>";
  html += '<span class="meta-chip"><b>År med data:</b> '+r.nYears+"</span>";
  html += '<span class="meta-chip"><b>Senaste år:</b> '+r.latestYr+"</span>";
  // F26 vem_besvarade metadata
  const vem = r.home.data[String(r.latestYr)]?.vem;
  if (vem) html += '<span class="meta-chip"><b>Svarade:</b> '+vem[0]+'% själv, '+vem[1]+'% med hjälp, '+vem[2]+'% anhörig</span>';
  if (r.home.url) html += '<a href="'+escHtml(r.home.url)+'" target="_blank" rel="noopener" class="meta-chip" style="color:#1565c0;text-decoration:none;cursor:pointer" onclick="event.stopPropagation()"><b>Webbsida &#8599;</b></a>';

function buildWeightSliders(container) {
  container.innerHTML = "";
  // Scored domains first
  for (const domain of DOMAIN_ORDER) {
    const qs = DOMAINS[domain];
    const header = document.createElement("div");
    header.className = "weight-domain-header";
    header.textContent = DOMAIN_NAMES[domain];
    container.appendChild(header);
    for (const q of qs) {
      const div = document.createElement("div");
      div.className = "weight-group";
      div.innerHTML = '<div class="weight-label"><span>' + Q_NAMES[q] +
        '</span><span id="wval-' + q + '">' + state.weights[q].toFixed(1) +
        '%</span></div><input type="range" class="weight-slider" min="0" max="100" ' +
        'value="' + state.weights[q].toFixed(1) + '" step="any" data-q="' + q +
        '" oninput="onWeightInput(\'' + q + '\',this.value)" ' +
        'onmousedown="onWeightDragStart(\'' + q + '\')" ontouchstart="onWeightDragStart(\'' + q + '\')">';
      container.appendChild(div);
    }
  }
  // Hälsa section (0% default, always visible)
  const halsaHdr = document.createElement("div");
  halsaHdr.className = "weight-domain-header";
  halsaHdr.style.color = "#9e9e9e";
  halsaHdr.textContent = DOMAIN_NAMES[HALSA_DOMAIN];
  container.appendChild(halsaHdr);
  const halsaWrap = document.createElement("div");
  halsaWrap.id = "halsaWrap";
  for (const q of DOMAINS[HALSA_DOMAIN]) {
    const div = document.createElement("div");
    div.className = "weight-group";
    div.innerHTML = '<div class="weight-label"><span>' + Q_NAMES[q] +
      '</span><span id="wval-' + q + '">' + state.weights[q].toFixed(1) +
      '%</span></div><input type="range" class="weight-slider" min="0" max="100" ' +
      'value="' + state.weights[q].toFixed(1) + '" step="any" data-q="' + q +
      '" oninput="onWeightInput(\'' + q + '\',this.value)" ' +
      'onmousedown="onWeightDragStart(\'' + q + '\')" ontouchstart="onWeightDragStart(\'' + q + '\')">';
    halsaWrap.appendChild(div);
  }
  container.appendChild(halsaWrap);
}

function buildPresets(container) {
  container.innerHTML = "";
  for (const name of Object.keys(PRESETS)) {
    const btn = document.createElement("button");
    btn.className = "preset-btn" + (state.activePreset === name ? " active" : "");
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    container.appendChild(btn);
  }
}

function onWeightDragStart(q) {
  dragOrigin = { q: q, weights: Object.assign({}, state.weights) };
}

function onWeightInput(q, sliderVal) {
  // Start drag tracking if not already active for this question
  if (!dragOrigin || dragOrigin.q !== q) {
    dragOrigin = { q: q, weights: Object.assign({}, state.weights) };
  }
  const newVal = Math.max(0, Math.min(100, parseFloat(sliderVal)));
  const orig = dragOrigin.weights;
  const delta = newVal - orig[q];
  const others = QUESTIONS.filter(qq => qq !== q);

  // Distribute delta evenly from original values
  const perOther = delta / others.length;
  const newWeights = {};
  let othersActualSum = 0;
  for (const oq of others) {
    const nw = Math.max(0, orig[oq] - perOther);
    newWeights[oq] = nw;
    othersActualSum += nw;
  }
  // Changed slider = 100 minus what others actually got (ensures exact sum)
  newWeights[q] = 100 - othersActualSum;

  state.weights = newWeights;
  state.activePreset = null;
  updateWeightUI();
  scheduleRecalc(true);
}

function updateWeightUI() {
  // Update sidebar sliders
  for (const q of QUESTIONS) {
    const slider = document.querySelector('#sidebarDesktop input[data-q="' + q + '"]');
    const label = document.getElementById("wval-" + q);
    if (slider) slider.value = state.weights[q];
    if (label) label.textContent = state.weights[q].toFixed(1) + "%";
  }
  // Update bottom sheet sliders if open
  for (const q of QUESTIONS) {
    const slider = document.querySelector('#bsContent input[data-q="' + q + '"]');
    const label = document.querySelector('#bsContent #bswval-' + q);
    if (slider) slider.value = state.weights[q];
    if (label) label.textContent = state.weights[q].toFixed(1) + "%";
  }
  updatePresetHighlight();
}

function updatePresetHighlight() {
  document.querySelectorAll(".preset-btn").forEach(btn => {
    const name = btn.textContent;
    const preset = PRESETS[name];
    if (preset) {
      const match = QUESTIONS.every(q => Math.abs(state.weights[q] - preset[q]) < 0.05);
      btn.classList.toggle("active", match);
      if (match) state.activePreset = name;
    }
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  state.weights = Object.assign({}, p);
  state.activePreset = name;
  dragOrigin = null;
  updateWeightUI();
  scheduleRecalc(true);
}

function resetAll() {
  state.mode = "linear";
  state.weights = Object.assign({}, PRESETS["Rekommenderad"]);
  state.lambda = 0.60;
  state.startYear = ALL_YEARS[0];
  state.activePreset = "Jämn";
  state.kommunFilter = "all";
  state.platserMin = 0;
  state.platserMax = 130;
  dragOrigin = null;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === "linear"));
  document.querySelectorAll("[data-kommun]").forEach(b => b.classList.toggle("active", b.dataset.kommun === "all"));
  document.getElementById("platserMinSlider").value = 0;
  document.getElementById("platserMaxSlider").value = 130;
  document.getElementById("platserMinVal").textContent = "0";
  document.getElementById("platserMaxVal").textContent = "130";
  document.getElementById("platserSummary").textContent = "";
  document.getElementById("ewmaSlider").value = 70;
  document.getElementById("startYearSlider").value = 0;
  updateWeightUI();
  updateEwmaUI();
  updateStartYearUI();
  scheduleRecalc(true);
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
  scheduleRecalc(true);
}

function onEwmaChange(val) {
  state.lambda = parseInt(val) / 100;
  updateEwmaUI();
  scheduleRecalc(true);
}
function updateEwmaUI() {
  document.getElementById("ewmaVal").textContent = "\u03BB = " + state.lambda.toFixed(2);
  const container = document.getElementById("yearWeights");
  const activeYears = ALL_YEARS.filter(y => y >= state.startYear);
  const weights = activeYears.map(y => Math.pow(state.lambda, LATEST_YEAR - y));
  const wSum = weights.reduce((a, b) => a + b, 0);
  let html = "";
  for (let i = 0; i < activeYears.length; i++) {
    const pct = (weights[i] / wSum * 100).toFixed(0);
    html += '<div class="year-weight-row"><span class="yw-year">' + activeYears[i] +
      '</span><div class="yw-bar"><div class="yw-fill" style="width:' + pct +
      '%"></div></div><span class="yw-pct">' + pct + "%</span></div>";
  }
  container.innerHTML = html;
  updateSummaryText();
}
function onStartYearChange(val) {
  state.startYear = ALL_YEARS[parseInt(val)] || ALL_YEARS[0];
  updateStartYearUI(); updateEwmaUI(); scheduleRecalc(true);
}
function updateStartYearUI() {
  const idx = ALL_YEARS.indexOf(state.startYear);
  document.getElementById("startYearSlider").value = idx >= 0 ? idx : 0;
  document.getElementById("startYearVal").textContent = state.startYear;
  updateSummaryText();
}
function updateSummaryText() {
  const activeYears = ALL_YEARS.filter(y => y >= state.startYear);
  const weights = activeYears.map(y => Math.pow(state.lambda, LATEST_YEAR - y));
  const wSum = weights.reduce((a, b) => a + b, 0);
  const latestPct = (weights[activeYears.indexOf(LATEST_YEAR)] / wSum * 100 || 0).toFixed(0);
  document.getElementById("summaryText").textContent =
    "Använder data fr\u00e5n " + state.startYear + "\u2013" + LATEST_YEAR + ". Senaste \u00e5ret v\u00e4ger " + latestPct + "%.";
}
function setTierFilter(tier) {
  state.tierFilter = tier;
  document.querySelectorAll(".tier-pill").forEach(b => b.classList.toggle("active", b.dataset.tier === tier));
  renderTable(currentResults, false);
}
function buildKommunPills() {
  const kommuner = [...new Set(HOMES.map(h => h.kommun))].sort((a, b) => a.localeCompare(b, "sv"));
  const row = document.getElementById("kommunRow");
  let html = '<button class="kommun-pill active" data-kommun="all" onclick="setKommunFilter(\'all\')">Alla</button>';
  for (const k of kommuner) {
    const count = HOMES.filter(h => h.kommun === k).length;
    html += '<button class="kommun-pill" data-kommun="' + escHtml(k) + '" onclick="setKommunFilter(\'' + escJs(k) + '\')">' + escHtml(k) + ' (' + count + ')</button>';
  }
  row.innerHTML = html;
}
function setKommunFilter(kommun) {
  state.kommunFilter = kommun;
  document.querySelectorAll("[data-kommun]").forEach(b => b.classList.toggle("active", b.dataset.kommun === kommun));
  renderTable(currentResults, false);
}
function onPlatserChange() {
  const minSliders = document.querySelectorAll("#platserMinSlider");
  const maxSliders = document.querySelectorAll("#platserMaxSlider");
  let lo = parseInt(minSliders[0].value);
  let hi = parseInt(maxSliders[0].value);
  if (lo > hi) { const t = lo; lo = hi; hi = t; }
  state.platserMin = lo;
  state.platserMax = hi;
  // Sync all instances (sidebar + bottom sheet)
  minSliders.forEach(s => s.value = lo);
  maxSliders.forEach(s => s.value = hi);
  document.querySelectorAll("#platserMinVal").forEach(e => e.textContent = lo);
  document.querySelectorAll("#platserMaxVal").forEach(e => e.textContent = hi >= 130 ? "130+" : hi);
  const count = HOMES.filter(h => h.platser != null && h.platser >= lo && h.platser <= hi).length;
  const txt = lo === 0 && hi >= 130 ? "" : count + " boenden i intervallet " + lo + "–" + (hi >= 130 ? "130+" : hi) + " platser";
  document.querySelectorAll("#platserSummary").forEach(e => e.textContent = txt);
  renderTable(currentResults, false);
}
function onSearch() {
  state.searchQuery = document.getElementById("searchInput").value;
  renderTable(currentResults, false);
}
function sortBy(col) {
  if (state.sortCol === col) state.sortAsc = !state.sortAsc;
  else { state.sortCol = col; state.sortAsc = col === "name" || col === "kommun" || col === "stadsdel" || col === "driftform"; }
  renderTable(currentResults, false);
}
function toggleDetail(homeId) {
  state.expandedId = state.expandedId === homeId ? null : homeId;
  renderTable(currentResults, false);
}

  for (const q of DOMAINS[HALSA_DOMAIN]) {

  html += '<h4 style="font-size:0.8rem;color:#666;margin-top:0.75rem;margin-bottom:0.4rem">Från år</h4>';

  html += '<div class="ewma-label"><span>Min</span><span>' + state.platserMin + '</span></div>';

function closeBottomSheet() {
  document.getElementById("bsOverlay").classList.remove("visible");

}

// ═══════════════════════════════════════════════════════════════════
// RECALCULATION SCHEDULING
// ═══════════════════════════════════════════════════════════════════

function scheduleRecalc(animate) {
  if (recalcTimer) cancelAnimationFrame(recalcTimer);
  recalcTimer = requestAnimationFrame(() => {
    currentResults = recalculate();
    renderTable(currentResults, animate);
    recalcTimer = null;
  });
}

// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════

function init() {
  document.getElementById("startYearSlider").max = ALL_YEARS.length - 1;
  buildWeightSliders(document.getElementById("weightSliders"));
  buildPresets(document.getElementById("presetBtns"));
  buildKommunPills();
  updateEwmaUI();
  updateStartYearUI();
  currentResults = recalculate();
  renderTable(currentResults, false);
}
document.addEventListener("DOMContentLoaded", init);
